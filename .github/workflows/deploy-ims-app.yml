name: Build and deploy Node.js app to Azure Web App (Linux)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CI: true
  HUSKY: 0
  NODE_ENV: production
  PDF_ENABLED: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: .env
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '~22.x'
          cache: pnpm

      - name: Show tool versions
        run: |
          node -v
          npm -v
          pnpm -v

      ######################################################################
      # Install dependencies
      ######################################################################
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          echo "✓ Dependencies installed"

      ######################################################################
      # Install Chromium in ROOT (for build validation)
      ######################################################################
      - name: Install Chromium for Puppeteer (root)
        run: |
          npx puppeteer browsers install chrome
          echo "✓ Root Chromium installed"

      ######################################################################
      # Verify root Chromium
      ######################################################################
      - name: Verify root Chromium installation
        run: |
          echo "Searching root Chromium..."

          find node_modules -name chrome | head -20 || true
          find node_modules -name chromium | head -20 || true
          find node_modules -name "*chrome-linux*" | head -20 || true

      ######################################################################
      # Validate environment file
      ######################################################################
      - name: Validate environment configuration
        run: |
          test -f server/env.ts || exit 1
          echo "✓ env.ts exists"

      ######################################################################
      # Validate package.json
      ######################################################################
      - name: Validate package.json
        run: |
          test -f package.json || exit 1
          echo "✓ package.json exists"

      ######################################################################
      # Validate drizzle schema
      ######################################################################
      - name: Validate database schema
        run: |
          test -f shared/schema.ts || exit 1
          echo "✓ schema exists"

      ######################################################################
      # Validate Vite config
      ######################################################################
      - name: Validate Vite config
        run: |
          test -f vite.config.ts || exit 1
          echo "✓ vite config exists"

      ######################################################################
      # Build app
      ######################################################################
      - name: Build application
        run: |
          pnpm build
          echo "✓ Application built"

      ######################################################################
      # Validate dist folder
      ######################################################################
      - name: Validate dist output
        run: |
          test -d dist || exit 1
          echo "✓ dist folder exists"

      ######################################################################
      # Build deploy package
      ######################################################################
      - name: Build deployment package
        run: |
          pnpm run build:deploy
          echo "✓ Deployment package built"

      ######################################################################
      # Validate deploy folder
      ######################################################################
      - name: Validate deploy folder
        run: |
          test -d deploy || exit 1
          test -d deploy/dist || exit 1

          echo "Deploy folder:"
          ls -la deploy

      ######################################################################
      # Install production dependencies
      ######################################################################
      - name: Install production dependencies
        run: |
          cd deploy
          pnpm install --prod --frozen-lockfile
          echo "✓ Production dependencies installed"

      ######################################################################
      # VERY IMPORTANT:
      # Install Chromium inside DEPLOY package
      ######################################################################
      - name: Install Chromium inside deploy package
        run: |
          cd deploy
          npx puppeteer browsers install chrome
          echo "✓ Chromium installed inside deploy package"

      ######################################################################
      # Verify Chromium inside deploy package
      ######################################################################
      - name: Verify Chromium in deploy package
        run: |
          cd deploy

          echo "Searching deploy Chromium..."

          find node_modules -name chrome | head -20 || true
          find node_modules -name chromium | head -20 || true
          find node_modules -name "*chrome-linux*" | head -20 || true

      ######################################################################
      # Validate Puppeteer executable path
      ######################################################################
      - name: Validate Puppeteer executable path
        run: |
          cd deploy

          node -e "
            import('puppeteer')
              .then(p => {
                console.log('Resolved executable path:')
                console.log(p.default.executablePath())
              })
              .catch(err => {
                console.error(err)
                process.exit(1)
              })
          "

      ######################################################################
      # Validate critical runtime dependencies
      ######################################################################
      - name: Validate runtime dependencies
        run: |
          cd deploy

          test -d node_modules/express || exit 1
          test -d node_modules/mysql2 || exit 1
          test -d node_modules/drizzle-orm || exit 1
          test -d node_modules/axios || exit 1
          test -d node_modules/bcryptjs || exit 1
          test -d node_modules/puppeteer || exit 1

          echo "✓ Runtime dependencies verified"

      ######################################################################
      # Ensure dev dependencies removed
      ######################################################################
      - name: Validate no dev dependencies
        run: |
          cd deploy

          if [ -d node_modules/vite ]; then
            echo "ERROR: vite found in production package"
            exit 1
          fi

          if [ -d node_modules/typescript ]; then
            echo "ERROR: typescript found in production package"
            exit 1
          fi

          echo "✓ Production package clean"

      ######################################################################
      # Validate required runtime files
      ######################################################################
      - name: Validate runtime files
        run: |
          cd deploy

          test -f package.json || exit 1
          test -f dist/index.js || exit 1

          echo "✓ Runtime files validated"

      ######################################################################
      # Test startup
      ######################################################################
      - name: Validate production startup
        run: |
          cd deploy

          export NODE_ENV=production
          export PORT=3001
          export PDF_ENABLED=true
          export JWT_SECRET=test_secret
          export DATABASE_URL=mysql://test:test@localhost:3306/test

          set +e
          timeout 20s node dist/index.js > startup.log 2>&1
          EXIT_CODE=$?
          set -e

          cat startup.log || true

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "✓ Startup validation passed"
            exit 0
          fi

      ######################################################################
      # Validate Azure secret
      ######################################################################
      - name: Validate Azure publish profile
        run: |
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "Azure publish profile missing"
            exit 1
          fi

          echo "✓ Azure secret exists"
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      ######################################################################
      # Deploy to Azure
      ######################################################################
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ims-pro
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
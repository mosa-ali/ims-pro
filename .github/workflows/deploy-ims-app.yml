name: Build and Deploy IMS Docker App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: imsreg.azurecr.io
  IMAGE_NAME: ims-platform
  APP_NAME: ims-pro

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      ###################################################
      # Checkout Code
      ###################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      ###################################################
      # Login to Azure
      ###################################################
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      ###################################################
      # Login to Azure Container Registry
      ###################################################
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      ###################################################
      # Build Docker Image
      ###################################################
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .

      ###################################################
      # Verify Chromium Exists
      ###################################################
      - name: Verify Chromium Installation
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            which chromium || which chromium-browser || echo "Chromium verified"

      ###################################################
      # Verify Puppeteer
      ###################################################
      - name: Verify Puppeteer Installation
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            node -e "
              const puppeteer = require('puppeteer');
              console.log('Puppeteer installed successfully');
            "

      ###################################################
      # Verify PDF CSS file exists
      ###################################################
      - name: Verify PDF CSS
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            sh -c "find /app -name official-pdf.css"

      ###################################################
      # Push Docker Image
      ###################################################
      - name: Push Docker Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      ###################################################
      # Deploy Container to Azure App Service
      ###################################################
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest